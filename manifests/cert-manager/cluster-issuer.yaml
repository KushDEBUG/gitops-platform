# Self-signed issuer: no real domain/Route53 needed, so this costs nothing
# and requires no external validation. Certs it issues won't show as
# "trusted" in a browser (you'll see a warning), but the entire mechanism -
# automatic issuance, renewal, storage as a Secret - works identically to
# a real Let's Encrypt setup. This is exactly what you'd swap out for a
# production domain later; nothing else about the Ingress/Cert-Manager
# wiring changes.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}

