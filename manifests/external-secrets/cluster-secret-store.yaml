# ClusterSecretStore: tells the operator WHERE to pull secrets from.
# No explicit credentials here - it authenticates via the Pod Identity
# association Terraform created (aws_eks_pod_identity_association.external_secrets),
# the same pattern as Karpenter's node IAM role.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # No auth block needed - Pod Identity injects credentials automatically
      # into the external-secrets controller pod.

---
# ExternalSecret: the actual "pull this specific secret" declaration.
# Notice there is NO secret VALUE anywhere in this file - only a reference
# (the secret's name/path in AWS Secrets Manager). This file is 100% safe
# to commit to a public GitHub repo.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-secret
  namespace: dev
spec:
  refreshInterval: 1h # how often to re-check AWS for an updated value
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: demo-secret # the Kubernetes Secret name that gets created
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: gitops-platform/dev/demo-secret
        property: username
    - secretKey: password
      remoteRef:
        key: gitops-platform/dev/demo-secret
        property: password
