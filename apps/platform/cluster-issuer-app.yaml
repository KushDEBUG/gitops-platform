apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-issuer
  namespace: argocd
  annotations:
    # Sync wave 1 = installed AFTER wave 0 (cert-manager itself) is Healthy.
    # This is what prevents "no matches for kind ClusterIssuer" errors.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  source:
    repoURL: https://github.com/KushDEBUG/gitops-platform.git
    targetRevision: main
    path: manifests/cert-manager
    directory:
      recurse: false

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
